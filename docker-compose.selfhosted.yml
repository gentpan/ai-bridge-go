# AI Bridge - 自托管模式 Docker Compose 配置
# 
# 此配置用于用户自己部署后端
# 特点：无需 Token，直接使用 AI 服务商的 API Key
#
# 使用方法：
# 1. 复制此文件为 docker-compose.yml
# 2. 根据你使用的 AI 提供商修改环境变量
# 3. docker-compose up -d

version: '3.8'

services:
  ai-bridge:
    image: ghcr.io/gentpan/ai-bridge-go:latest
    container_name: ai-bridge-selfhosted
    restart: unless-stopped

    ports:
      - "${PORT:-8080}:8080"

    volumes:
      # 数据持久化（使用量统计等）
      - ./data:/app/data

    environment:
      # 基础配置
      - LISTEN_ADDR=:8080
      - DATA_DIR=/app/data
      
      # 节点配置
      - NODE_NAME=${NODE_NAME:-selfhosted}
      - NODE_TRAFFIC_MODE=${NODE_TRAFFIC_MODE:-outbound}

      # 限流配置
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-120}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-60}

      # 默认模型
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-openai}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4.1-mini}

      # AI 提供商配置（根据你使用的配置）
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com/v1}
      - GOOGLE_BASE_URL=${GOOGLE_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}

      # 注意：自托管模式不需要配置 SITE_TOKEN！
      # 只要没有 SITE_TOKEN，后端就会自动作为自托管运行

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 资源限制（可选）
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 512M
